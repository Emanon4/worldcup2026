<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ＷＯＲＬＤ　ＣＵＰ　２０２６ ⚽ 蒸汽波赛程</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --neon-pink:#ff71ce;--neon-cyan:#01cdfe;--neon-purple:#b967ff;
  --neon-yellow:#fffb96;--neon-orange:#ff6b6b;--neon-green:#05ffa1;
  --vapor-bg:#1a0a2e;--vapor-dark:#0d0221;--vapor-card:rgba(20,10,50,0.85);
  --grid-color:rgba(255,113,206,0.12);
}
body{font-family:'Orbitron','Courier New',monospace;background:var(--vapor-bg);color:#e0d0ff;min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,#0d0221 0%,#1a0a2e 25%,#2d1b69 50%,#5b2c8e 75%,#ff6b6b 90%,#fffb96 100%);
  z-index:-3}
body::after{content:'';position:fixed;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,transparent 0%,rgba(255,113,206,0.08) 100%);z-index:-2}
.grid-floor{position:fixed;bottom:0;left:0;right:0;height:35%;z-index:-1;
  background:linear-gradient(180deg,transparent 0%,rgba(255,113,206,0.05) 30%),
    repeating-linear-gradient(90deg,var(--grid-color) 0px,var(--grid-color) 1px,transparent 1px,transparent 80px),
    repeating-linear-gradient(0deg,var(--grid-color) 0px,var(--grid-color) 1px,transparent 1px,transparent 80px);
  transform:perspective(400px) rotateX(60deg);transform-origin:bottom center;
  animation:gridScroll 4s linear infinite}
@keyframes gridScroll{0%{background-position:0 0,0 0,0 0}100%{background-position:0 80px,0 0,0 80px}}
.synth-sun{position:fixed;bottom:22%;left:50%;transform:translateX(-50%);width:300px;height:150px;z-index:-1;overflow:hidden}
.synth-sun::before{content:'';position:absolute;bottom:0;left:0;right:0;top:0;
  background:linear-gradient(180deg,#fffb96 0%,#ff6b6b 30%,#b967ff 60%,#01cdfe 100%);
  border-radius:300px 300px 0 0;
  -webkit-mask:repeating-linear-gradient(0deg,#000 0px,#000 8px,transparent 8px,transparent 12px);
  mask:repeating-linear-gradient(0deg,#000 0px,#000 8px,transparent 8px,transparent 12px)}
.scanlines{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.06) 0px,rgba(0,0,0,0.06) 1px,transparent 1px,transparent 3px)}
.hero{padding:60px 20px 40px;text-align:center;position:relative}
.hero h1{font-size:2.8em;font-weight:900;letter-spacing:0.15em;
  background:linear-gradient(180deg,var(--neon-yellow) 0%,var(--neon-pink) 50%,var(--neon-purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(255,113,206,0.5);position:relative;
  animation:titleGlow 3s ease-in-out infinite alternate}
@keyframes titleGlow{0%{filter:brightness(1) drop-shadow(0 0 10px rgba(255,113,206,0.3))}100%{filter:brightness(1.2) drop-shadow(0 0 25px rgba(255,113,206,0.6))}}
.hero .sub{color:var(--neon-cyan);font-size:.85em;margin-top:8px;letter-spacing:.3em;text-transform:uppercase}
.hero .stats{display:flex;justify-content:center;gap:24px;margin-top:28px;flex-wrap:wrap}
.hero .stat{text-align:center;padding:12px 16px;border:1px solid rgba(255,113,206,0.3);border-radius:4px;background:rgba(255,113,206,0.05)}
.hero .stat .num{font-size:1.8em;font-weight:900;color:var(--neon-pink);text-shadow:0 0 10px rgba(255,113,206,0.5)}
.hero .stat .label{font-size:.65em;color:var(--neon-cyan);letter-spacing:.15em;margin-top:4px;text-transform:uppercase}
.container{max-width:1200px;margin:0 auto;padding:0 20px 40px;position:relative;z-index:1}
.timeline-bar{display:flex;justify-content:space-between;align-items:center;margin:24px 0 16px;padding:16px;
  background:rgba(20,10,50,0.8);border:1px solid rgba(255,113,206,0.25);border-radius:2px;flex-wrap:wrap;gap:6px}
.tl-node{text-align:center;flex:1;min-width:70px}
.tl-node .dot{width:10px;height:10px;border-radius:50%;margin:0 auto 4px;box-shadow:0 0 8px currentColor}
.tl-node .date{font-size:.65em;color:rgba(255,255,255,0.4);letter-spacing:.05em}
.tl-node .stage{font-size:.7em;font-weight:700;letter-spacing:.1em}
.tl-line{flex:0 0 auto;width:20px;height:1px;background:linear-gradient(90deg,var(--neon-pink),var(--neon-cyan))}
.filters{display:flex;gap:6px;margin:16px 0;flex-wrap:wrap}
.filter-btn{padding:8px 16px;border-radius:0;border:1px solid rgba(185,103,255,0.4);background:transparent;
  color:var(--neon-purple);cursor:pointer;font-family:'Orbitron',monospace;font-size:.75em;letter-spacing:.1em;
  transition:all .2s;text-transform:uppercase}
.filter-btn:hover,.filter-btn.active{background:var(--neon-purple);color:var(--vapor-dark);border-color:var(--neon-purple);
  box-shadow:0 0 15px rgba(185,103,255,0.5)}
.search-box{margin:12px 0}
.search-box input{width:100%;padding:12px 20px;border-radius:0;border:1px solid rgba(1,205,254,0.3);
  background:rgba(20,10,50,0.8);color:var(--neon-cyan);font-family:'Orbitron',monospace;font-size:.85em;
  letter-spacing:.05em;outline:none}
.search-box input:focus{border-color:var(--neon-cyan);box-shadow:0 0 20px rgba(1,205,254,0.2)}
.search-box input::placeholder{color:rgba(1,205,254,0.3)}
.legend{display:flex;flex-wrap:wrap;gap:4px;margin:12px 0}
.legend .item{font-size:.65em;padding:3px 8px;border-radius:0;font-weight:700;letter-spacing:.05em;font-family:'Orbitron',monospace}
.group-A{background:#ff71ce;color:#0d0221}.group-B{background:#ff6b6b;color:#0d0221}
.group-C{background:#fffb96;color:#0d0221}.group-D{background:#05ffa1;color:#0d0221}
.group-E{background:#01cdfe;color:#0d0221}.group-F{background:#b967ff;color:#0d0221}
.group-G{background:#ff71ce;color:#0d0221}.group-H{background:#ff6b6b;color:#0d0221}
.group-I{background:#fffb96;color:#0d0221}.group-J{background:#05ffa1;color:#0d0221}
.group-K{background:#01cdfe;color:#0d0221}.group-L{background:#b967ff;color:#0d0221}
.ko-stage{background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple));color:#fff}
.day-section{margin:20px 0}
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:10px 16px;
  background:linear-gradient(90deg,rgba(255,113,206,0.1),rgba(185,103,255,0.05));border-left:3px solid var(--neon-pink);border-radius:0}
.day-header .date{font-size:.95em;font-weight:700;color:var(--neon-pink);letter-spacing:.1em}
.day-header .count{font-size:.7em;color:rgba(1,205,254,0.6);border:1px solid rgba(1,205,254,0.2);padding:2px 8px;letter-spacing:.05em}
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.match-card{background:var(--vapor-card);border-radius:0;padding:14px;transition:all .25s;
  border:1px solid rgba(185,103,255,0.15);position:relative;overflow:hidden;backdrop-filter:blur(4px)}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--neon-pink),var(--neon-cyan),var(--neon-purple))}
.match-card:hover{border-color:var(--neon-pink);transform:translateY(-3px);
  box-shadow:0 4px 30px rgba(255,113,206,0.2),0 0 60px rgba(185,103,255,0.1)}
.match-card .time-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.match-card .kickoff{font-size:1.3em;font-weight:900;color:var(--neon-cyan);text-shadow:0 0 10px rgba(1,205,254,0.5);letter-spacing:.05em}
.match-card .group-tag{font-size:.6em;padding:2px 8px;font-weight:700;letter-spacing:.1em;font-family:'Orbitron',monospace}
.match-card .teams{display:flex;align-items:center;justify-content:space-between;gap:6px}
.match-card .team{flex:1;text-align:center}
.match-card .team .flag{font-size:1.8em}
.match-card .team .name{font-size:.75em;font-weight:700;margin-top:4px;letter-spacing:.05em;color:#c8b8e8}
.match-card .vs{font-size:.8em;color:rgba(255,113,206,0.6);font-weight:900;flex-shrink:0;letter-spacing:.1em}
.match-card .venue{font-size:.7em;color:rgba(1,205,254,0.4);margin-top:8px;padding-top:6px;
  border-top:1px solid rgba(185,103,255,0.1);letter-spacing:.05em}
.match-card .scorer{font-size:.7em;color:var(--neon-yellow);margin-top:6px;line-height:1.6;letter-spacing:.02em}
.match-card .countdown{font-size:.7em;color:var(--neon-green);margin-top:6px;font-weight:700;text-align:center;
  text-shadow:0 0 8px rgba(5,255,161,0.4);letter-spacing:.05em}
.match-card .live-badge{display:inline-block;background:var(--neon-orange);color:#fff;font-size:.6em;
  padding:2px 8px;animation:blink 1s infinite;margin-left:6px;letter-spacing:.1em;font-family:'Orbitron',monospace}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.match-card.ko{border-left:3px solid var(--neon-purple)}
.match-card.ko::before{background:linear-gradient(90deg,var(--neon-purple),var(--neon-pink),var(--neon-yellow))}
.match-card.finished{border-color:rgba(5,255,161,0.2);opacity:.85}
.match-card.finished .kickoff{color:rgba(1,205,254,0.4);text-shadow:none}
.update-note{text-align:center;padding:8px;background:rgba(20,10,50,0.8);
  border:1px solid rgba(1,205,254,0.2);margin:12px 0;font-size:.7em;color:rgba(1,205,254,0.6);
  letter-spacing:.1em;font-family:'Orbitron',monospace}
.update-note .live{color:var(--neon-green);font-weight:700;text-shadow:0 0 8px rgba(5,255,161,0.5)}
.footer{text-align:center;padding:32px;color:rgba(185,103,255,0.3);font-size:.65em;
  border-top:1px solid rgba(255,113,206,0.1);margin-top:40px;letter-spacing:.15em;text-transform:uppercase}
.glitch{position:relative;display:inline-block}
.glitch::before,.glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
.glitch::before{animation:glitch1 2s infinite;color:var(--neon-cyan);clip-path:inset(0 0 80% 0)}
.glitch::after{animation:glitch2 2s infinite;color:var(--neon-pink);clip-path:inset(80% 0 0 0)}
@keyframes glitch1{0%,100%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}}
@keyframes glitch2{0%,100%{transform:translate(0)}20%{transform:translate(2px,-1px)}40%{transform:translate(-2px,1px)}60%{transform:translate(1px,-2px)}}
@media(max-width:600px){
  .hero h1{font-size:1.4em;letter-spacing:.08em}
  .hero .stats{gap:8px}.hero .stat{padding:8px 10px}.hero .stat .num{font-size:1.3em}
  .match-grid{grid-template-columns:1fr}
  .timeline-bar{gap:2px;padding:8px}.tl-node{min-width:50px}.tl-line{width:10px}
  .synth-sun{width:200px;height:100px}
}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="synth-sun"></div>
<div class="grid-floor"></div>
<div class="hero">
  <h1 class="glitch" data-text="⚽ ＷＯＲＬＤ　ＣＵＰ　２０２６">⚽ ＷＯＲＬＤ　ＣＵＰ　２０２６</h1>
  <div class="sub">美加墨 · 完整赛程 · 北京时间 · 实时更新</div>
  <div class="stats">
    <div class="stat"><div class="num">48</div><div class="label">ＴＥＡＭＳ</div></div>
    <div class="stat"><div class="num">104</div><div class="label">ＭＡＴＣＨＥＳ</div></div>
    <div class="stat"><div class="num">12</div><div class="label">ＧＲＯＵＰＳ</div></div>
    <div class="stat"><div class="num">16</div><div class="label">ＶＥＮＵＥＳ</div></div>
    <div class="stat"><div class="num">39</div><div class="label">ＤＡＹＳ</div></div>
  </div>
</div>
<div class="container">
  <div class="update-note" id="updateNote"><span class="live">● ＬＩＶＥ</span>　数据加载中...</div>
  <div class="timeline-bar">
    <div class="tl-node"><div class="dot" style="color:var(--neon-green);background:var(--neon-green)"></div><div class="date">6/12</div><div class="stage" style="color:var(--neon-green)">揭幕战</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="color:var(--neon-cyan);background:var(--neon-cyan)"></div><div class="date">6/12-28</div><div class="stage" style="color:var(--neon-cyan)">小组赛</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="color:var(--neon-purple);background:var(--neon-purple)"></div><div class="date">6/29-7/4</div><div class="stage" style="color:var(--neon-purple)">32强</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="color:var(--neon-pink);background:var(--neon-pink)"></div><div class="date">7/5-8</div><div class="stage" style="color:var(--neon-pink)">16强</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="color:var(--neon-yellow);background:var(--neon-yellow)"></div><div class="date">7/10-12</div><div class="stage" style="color:var(--neon-yellow)">8强</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="color:var(--neon-orange);background:var(--neon-orange)"></div><div class="date">7/14-16</div><div class="stage" style="color:var(--neon-orange)">半决赛</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="color:var(--neon-green);background:var(--neon-green)"></div><div class="date">7/19</div><div class="stage" style="color:var(--neon-green)">决赛</div></div>
  </div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 搜索球队 · 城市 · 小组..." oninput="render()"></div>
  <div class="filters" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" onclick="setFilter('group',this)">小组赛</button>
    <button class="filter-btn" onclick="setFilter('r32',this)">32强</button>
    <button class="filter-btn" onclick="setFilter('r16',this)">16强</button>
    <button class="filter-btn" onclick="setFilter('qf',this)">1/4决赛</button>
    <button class="filter-btn" onclick="setFilter('sf',this)">半决赛</button>
    <button class="filter-btn" onclick="setFilter('final',this)">决赛</button>
  </div>
  <div class="legend">
    <span class="item group-A">A</span><span class="item group-B">B</span><span class="item group-C">C</span>
    <span class="item group-D">D</span><span class="item group-E">E</span><span class="item group-F">F</span>
    <span class="item group-G">G</span><span class="item group-H">H</span><span class="item group-I">I</span>
    <span class="item group-J">J</span><span class="item group-K">K</span><span class="item group-L">L</span>
  </div>
  <div id="scheduleArea"></div>
</div>
<div class="footer">
  ＦＩＦＡ　ＷＯＲＬＤ　ＣＵＰ　２０２６™　·　ＵＳＡ　/　ＣＡＮＡＤＡ　/　ＭＥＸＩＣＯ<br>
  ＡＥＳＴＨＥＴＩＣ　ＳＣＨＥＤＵＬＥ　·　自动更新　·　北京时间
</div>
<script>
let M=[],curFilter='all';
function matchDate(m){const dm=m.d.match(/(\d+)月(\d+)日/),tm=m.t.match(/(\d+):(\d+)/);if(!dm||!tm)return null;return new Date(2026,parseInt(dm[1])-1,parseInt(dm[2]),parseInt(tm[1]),parseInt(tm[2]))}
function isLive(m){const d=matchDate(m);if(!d)return false;const now=new Date();return now>=d&&now<new Date(d.getTime()+120*60000)&&!m.r}
function countdown(m){const d=matchDate(m);if(!d)return'';const diff=d-new Date();if(diff<=0)return'';const h=Math.floor(diff/3600000),mi=Math.floor((diff%3600000)/60000);if(h>24){const days=Math.floor(h/24);return'⏰ '+days+'D'+(h%24)+'H'}return'⏰ '+h+'H'+mi+'M'}
function setFilter(f,btn){curFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render()}
function render(){
  const area=document.getElementById('scheduleArea'),searchQ=(document.getElementById('searchInput').value||'').toLowerCase();
  let filtered=M.filter(m=>{if(curFilter!=='all'&&m.s!==curFilter)return false;if(curFilter==='final'&&m.s!=='final')return false;if(searchQ){const h=(m.n1+m.n2+m.v+m.g+m.d+m.ko+m.r).toLowerCase();if(!h.includes(searchQ))return false}return true});
  const days={};filtered.forEach(m=>{if(!days[m.d])days[m.d]=[];days[m.d].push(m)});
  let html='';
  for(const[day,ms]of Object.entries(days)){
    const simC=ms.filter(m=>m.sim).length,finC=ms.filter(m=>m.r).length,liveC=ms.filter(m=>isLive(m)&&!m.r).length;
    html+='<div class="day-section"><div class="day-header"><span class="date">▸ '+day+'</span><span class="count">'+ms.length+'M'+(simC?' · SYNC':'')+(liveC?' · LIVE':'')+(finC?' · ✓':'')+'</span></div><div class="match-grid">';
    ms.forEach(m=>{
      const isKo=m.s!=='group',tagClass=m.g?'group-'+m.g:'ko-stage',tagText=m.g?m.g:(m.ko||'');
      const simBadge=m.sim?' <span style="color:var(--neon-orange);font-size:.65em">SYNC</span>':'';
      const finished=!!m.r,live=isLive(m)&&!finished,cd=!finished&&!live?countdown(m):'';
      let vsContent='VS';
      if(finished)vsContent='<span style="color:var(--neon-yellow);font-size:1.1em;font-weight:900;text-shadow:0 0 8px rgba(255,251,150,0.5)">'+m.r+'</span>';
      else if(live)vsContent='<span style="color:var(--neon-orange);font-size:.9em;font-weight:700">LIVE</span>';
      html+='<div class="match-card'+(isKo?' ko':'')+(finished?' finished':'')+(live?' live':'')+'"><div class="time-row"><span class="kickoff">'+m.t+simBadge+(live?'<span class="live-badge">LIVE</span>':'')+'</span><span class="group-tag '+tagClass+'">'+tagText+'</span></div><div class="teams"><div class="team"><div class="flag">'+m.t1+'</div><div class="name">'+m.n1+'</div></div><div class="vs">'+vsContent+'</div><div class="team"><div class="flag">'+m.t2+'</div><div class="name">'+m.n2+'</div></div></div>'+(finished&&m.sc?'<div class="scorer">'+m.sc+'</div>':'')+(cd?'<div class="countdown">'+cd+'</div>':'')+'<div class="venue">📍 '+m.v+'</div></div>';
    });
    html+='</div></div>';
  }
  if(!html)html='<div style="text-align:center;padding:40px;color:rgba(185,103,255,0.3)">没有匹配的比赛</div>';
  area.innerHTML=html;
}
async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now()),d=await r.json();
    M=d.matches||[];const upd=d.lastUpdated||'';
    document.getElementById('updateNote').innerHTML='<span class="live">● LIVE</span>　更新至 '+upd.replace('T',' ').replace(/\+08:00/,' BJT')+'　·　每5分钟自动刷新';
  }catch(e){document.getElementById('updateNote').innerHTML='<span style="color:var(--neon-orange)">⚠ 数据加载失败</span>';console.error(e)}
  render();
}
loadData();setInterval(loadData,300000);setInterval(render,60000);
</script>
</body>
</html>
