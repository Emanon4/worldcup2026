<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 美加墨世界杯完整赛程 · 北京时间</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif;background:#0a0e1a;color:#e0e0e0;min-height:100vh}
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 40%,#312e81 100%);padding:48px 20px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(99,102,241,0.15) 0%,transparent 50%),radial-gradient(circle at 70% 50%,rgba(236,72,153,0.1) 0%,transparent 50%);animation:pulse 8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.hero h1{font-size:2.4em;font-weight:800;background:linear-gradient(135deg,#818cf8,#f472b6,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative}
.hero .sub{color:#94a3b8;font-size:1.1em;margin-top:8px;position:relative}
.hero .stats{display:flex;justify-content:center;gap:32px;margin-top:24px;position:relative;flex-wrap:wrap}
.hero .stat{text-align:center}
.hero .stat .num{font-size:2em;font-weight:800;color:#818cf8}
.hero .stat .label{font-size:.85em;color:#64748b;margin-top:2px}
.container{max-width:1200px;margin:0 auto;padding:20px}
.timeline-bar{display:flex;justify-content:space-between;align-items:center;margin:32px 0 16px;padding:20px;background:linear-gradient(135deg,#1e1b4b 0%,#1e293b 100%);border-radius:16px;flex-wrap:wrap;gap:8px}
.tl-node{text-align:center;flex:1;min-width:80px}
.tl-node .dot{width:14px;height:14px;border-radius:50%;margin:0 auto 6px}
.tl-node .date{font-size:.75em;color:#94a3b8}
.tl-node .stage{font-size:.85em;font-weight:700}
.tl-line{flex:0 0 auto;width:30px;height:2px;background:#334155}
.filters{display:flex;gap:8px;margin:20px 0;flex-wrap:wrap}
.filter-btn{padding:8px 18px;border-radius:20px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:.9em;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
.day-section{margin:24px 0}
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:10px 16px;background:#1e293b;border-radius:12px;border-left:4px solid #6366f1}
.day-header .date{font-size:1.1em;font-weight:700;color:#c7d2fe}
.day-header .count{font-size:.85em;color:#64748b;background:#0f172a;padding:2px 10px;border-radius:10px}
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.match-card{background:#1e293b;border-radius:12px;padding:16px;transition:all .2s;border:1px solid #334155;position:relative;overflow:hidden}
.match-card:hover{border-color:#6366f1;transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,0.15)}
.match-card .time-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.match-card .kickoff{font-size:1.4em;font-weight:800;color:#818cf8}
.match-card .group-tag{font-size:.75em;padding:2px 8px;border-radius:8px;font-weight:700}
.match-card .teams{display:flex;align-items:center;justify-content:space-between;gap:8px}
.match-card .team{flex:1;text-align:center}
.match-card .team .flag{font-size:2em}
.match-card .team .name{font-size:.9em;font-weight:600;margin-top:4px}
.match-card .vs{font-size:.85em;color:#475569;font-weight:700;flex-shrink:0}
.match-card .venue{font-size:.8em;color:#64748b;margin-top:10px;padding-top:8px;border-top:1px solid #334155;display:flex;align-items:center;gap:4px}
.match-card .scorer{font-size:.75em;color:#94a3b8;margin-top:6px;line-height:1.5}
.match-card .countdown{font-size:.8em;color:#22c55e;margin-top:6px;font-weight:600;text-align:center}
.match-card .live-badge{display:inline-block;background:#ef4444;color:#fff;font-size:.7em;padding:2px 8px;border-radius:6px;animation:blink 1.5s infinite;margin-left:6px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.group-A{background:#dc2626;color:#fff}.group-B{background:#ea580c;color:#fff}.group-C{background:#d97706;color:#fff}.group-D{background:#65a30d;color:#fff}.group-E{background:#059669;color:#fff}.group-F{background:#0891b2;color:#fff}.group-G{background:#2563eb;color:#fff}.group-H{background:#7c3aed;color:#fff}.group-I{background:#c026d3;color:#fff}.group-J{background:#e11d48;color:#fff}.group-K{background:#0d9488;color:#fff}.group-L{background:#a855f7;color:#fff}
.ko-stage{background:#fbbf24;color:#000}
.match-card.ko{border-left:3px solid #fbbf24}
.match-card.finished{border-color:#22c55e40;opacity:.92}
.match-card.finished .kickoff{color:#64748b}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.legend .item{font-size:.75em;padding:3px 8px;border-radius:6px;font-weight:600}
.search-box{margin:16px 0}
.search-box input{width:100%;padding:12px 20px;border-radius:12px;border:1px solid #334155;background:#1e293b;color:#e0e0e0;font-size:1em;outline:none}
.search-box input:focus{border-color:#6366f1}
.search-box input::placeholder{color:#64748b}
.footer{text-align:center;padding:32px;color:#475569;font-size:.85em;border-top:1px solid #1e293b;margin-top:40px}
.update-note{text-align:center;padding:8px;background:#1e293b;border-radius:8px;margin:12px 0;font-size:.85em;color:#94a3b8}
.update-note .live{color:#22c55e;font-weight:700}
@media(max-width:600px){.hero h1{font-size:1.6em}.hero .stats{gap:16px}.match-grid{grid-template-columns:1fr}.timeline-bar{gap:4px;padding:12px}.tl-node{min-width:60px}.tl-line{width:12px}}
</style>
</head>
<body>
<div class="hero">
  <h1>⚽ 2026 美加墨世界杯</h1>
  <div class="sub">完整赛程 · 北京时间 (UTC+8) · 实时更新</div>
  <div class="stats">
    <div class="stat"><div class="num">48</div><div class="label">支球队</div></div>
    <div class="stat"><div class="num">104</div><div class="label">场比赛</div></div>
    <div class="stat"><div class="num">12</div><div class="label">个小组</div></div>
    <div class="stat"><div class="num">16</div><div class="label">座球场</div></div>
    <div class="stat"><div class="num">39</div><div class="label">天赛程</div></div>
  </div>
</div>
<div class="container">
  <div class="update-note" id="updateNote"><span class="live">● LIVE</span> 数据加载中...</div>
  <div class="timeline-bar">
    <div class="tl-node"><div class="dot" style="background:#22c55e"></div><div class="date">6/12</div><div class="stage" style="color:#22c55e">揭幕战</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="background:#818cf8"></div><div class="date">6/12-28</div><div class="stage" style="color:#818cf8">小组赛</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="background:#a78bfa"></div><div class="date">6/29-7/4</div><div class="stage" style="color:#a78bfa">32强</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="background:#c084fc"></div><div class="date">7/5-8</div><div class="stage" style="color:#c084fc">16强</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="background:#f472b6"></div><div class="date">7/10-12</div><div class="stage" style="color:#f472b6">8强</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="background:#fb923c"></div><div class="date">7/14-16</div><div class="stage" style="color:#fb923c">半决赛</div></div>
    <div class="tl-line"></div>
    <div class="tl-node"><div class="dot" style="background:#fbbf24"></div><div class="date">7/19</div><div class="stage" style="color:#fbbf24">决赛</div></div>
  </div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 搜索球队、城市、小组..." oninput="render()"></div>
  <div class="filters" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
    <button class="filter-btn" onclick="setFilter('group',this)">小组赛</button>
    <button class="filter-btn" onclick="setFilter('r32',this)">32强</button>
    <button class="filter-btn" onclick="setFilter('r16',this)">16强</button>
    <button class="filter-btn" onclick="setFilter('qf',this)">1/4决赛</button>
    <button class="filter-btn" onclick="setFilter('sf',this)">半决赛</button>
    <button class="filter-btn" onclick="setFilter('final',this)">决赛</button>
  </div>
  <div class="legend">
    <span class="item group-A">A组</span><span class="item group-B">B组</span><span class="item group-C">C组</span>
    <span class="item group-D">D组</span><span class="item group-E">E组</span><span class="item group-F">F组</span>
    <span class="item group-G">G组</span><span class="item group-H">H组</span><span class="item group-I">I组</span>
    <span class="item group-J">J组</span><span class="item group-K">K组</span><span class="item group-L">L组</span>
  </div>
  <div id="scheduleArea"></div>
</div>
<div class="footer">数据来源：FIFA 官方赛程 · 时间已转换为北京时间 (UTC+8)<br>自动更新 · 以官方最终公布为准</div>
<script>
let M=[],curFilter='all';
// Build a Date object from match day+time (BJT)
function matchDate(m){
  // Parse "6月12日 周四" and "03:00" → Date
  const dm=m.d.match(/(\d+)月(\d+)日/);
  const tm=m.t.match(/(\d+):(\d+)/);
  if(!dm||!tm)return null;
  return new Date(2026,parseInt(dm[1])-1,parseInt(dm[2]),parseInt(tm[1]),parseInt(tm[2]));
}
function isLive(m){
  const d=matchDate(m);if(!d)return false;
  const now=new Date();
  const end=new Date(d.getTime()+120*60000); // +2h
  return now>=d&&now<end;
}
function isFinished(m){return !!m.r}
function countdown(m){
  const d=matchDate(m);if(!d)return '';
  const diff=d-new Date();
  if(diff<=0)return '';
  const h=Math.floor(diff/3600000);
  const mi=Math.floor((diff%3600000)/60000);
  if(h>24){const days=Math.floor(h/24);return `⏰ ${days}天${h%24}h后开赛`}
  return `⏰ ${h}h${mi}m后开赛`;
}
function setFilter(f,btn){curFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render()}
function render(){
  const area=document.getElementById('scheduleArea');
  const searchQ=(document.getElementById('searchInput').value||'').toLowerCase();
  let filtered=M.filter(m=>{
    if(curFilter!=='all'&&m.s!==curFilter)return false;
    if(curFilter==='final'&&m.s!=='final')return false;
    if(searchQ){const h=(m.n1+m.n2+m.v+m.g+m.d+m.ko+m.r).toLowerCase();if(!h.includes(searchQ))return false}
    return true;
  });
  const days={};filtered.forEach(m=>{if(!days[m.d])days[m.d]=[];days[m.d].push(m)});
  let html='';
  for(const[day,ms]of Object.entries(days)){
    const simC=ms.filter(m=>m.sim).length;
    const finC=ms.filter(m=>m.r).length;
    const liveC=ms.filter(m=>isLive(m)&&!m.r).length;
    html+=`<div class="day-section"><div class="day-header"><span class="date">📅 ${day}</span><span class="count">${ms.length} 场${simC?' · 🔴 同步开球':''}${liveC?' · 🔴 进行中':''}${finC?' · ✅ 已结束':''}</span></div><div class="match-grid">`;
    ms.forEach(m=>{
      const isKo=m.s!=='group';
      const tagClass=m.g?`group-${m.g}`:'ko-stage';
      const tagText=m.g?`${m.g}组`:(m.ko||'');
      const simBadge=m.sim?' <span style="color:#f87171;font-size:.7em">同步</span>':'';
      const finished=isFinished(m);
      const live=isLive(m)&&!finished;
      const cd=!finished&&!live?countdown(m):'';
      let vsContent='VS';
      if(finished)vsContent=`<span style="color:#fbbf24;font-size:1.2em;font-weight:800">${m.r}</span>`;
      else if(live)vsContent=`<span style="color:#ef4444;font-size:1em;font-weight:700">LIVE</span>`;
      html+=`<div class="match-card${isKo?' ko':''}${finished?' finished':''}${live?' live':''}">
        <div class="time-row">
          <span class="kickoff">${m.t}${simBadge}${live?'<span class="live-badge">LIVE</span>':''}</span>
          <span class="group-tag ${tagClass}">${tagText}</span>
        </div>
        <div class="teams">
          <div class="team"><div class="flag">${m.t1}</div><div class="name">${m.n1}</div></div>
          <div class="vs">${vsContent}</div>
          <div class="team"><div class="flag">${m.t2}</div><div class="name">${m.n2}</div></div>
        </div>
        ${finished&&m.sc?'<div class="scorer">'+m.sc+'</div>':''}
        ${cd?'<div class="countdown">'+cd+'</div>':''}
        <div class="venue">📍 ${m.v}</div>
      </div>`;
    });
    html+='</div></div>';
  }
  if(!html)html='<div style="text-align:center;padding:40px;color:#64748b">没有匹配的比赛</div>';
  area.innerHTML=html;
}
// Load data
async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    const d=await r.json();
    M=d.matches||[];
    const upd=d.lastUpdated||'';
    document.getElementById('updateNote').innerHTML=`<span class="live">● LIVE</span> 数据更新至 ${upd.replace('T',' ').replace(/\+08:00/,' BJT')} · 每5分钟自动刷新`;
  }catch(e){
    document.getElementById('updateNote').innerHTML='<span style="color:#ef4444">⚠ 数据加载失败</span>';
    console.error(e);
  }
  render();
}
loadData();
// Auto-refresh every 5 min
setInterval(loadData,300000);
// Update countdowns every 60s
setInterval(render,60000);
</script>
</body>
</html>
